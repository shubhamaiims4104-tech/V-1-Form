
<!DOCTYPE html>
<html>
<head>
<title>Screen Habit Survey</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<h1>Student Screen Time Survey</h1>

<form id="surveyForm">

<label>Name</label>
<input type="text" id="name"><br><br>

<label>Daily Screen Time (hours)</label>
<input type="number" id="screenTime"><br><br>

<label>Do you feel angry when gaming stops?</label>
<select id="anger">
<option>Yes</option>
<option>No</option>
</select><br><br>

<label>Do games affect your sleep?</label>
<select id="sleep">
<option>Yes</option>
<option>No</option>
</select><br><br>

<button type="submit">Submit</button>

</form>

<script src="js/survey.js"></script>

</body>
</html>
